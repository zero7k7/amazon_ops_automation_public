name: Demo cross-platform validation

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  demo:
    name: ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.13"]
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate demo data
        run: python scripts/setup_demo_data.py

      - name: Run safe-run smoke test
        run: python main.py --marketplace ALL --safe-run

      - name: Validate public demo outputs
        run: python scripts/validate_public_demo_smoke.py

      - name: Run public smoke tests
        run: >-
          python -m pytest
          tests/test_cross_platform_launchers.py
          tests/test_showcase_commit_readiness.py::test_setup_demo_data_writes_public_offline_runtime_inputs
          tests/test_report_action_server_upload.py::test_missing_latest_report_returns_empty_state_page
          tests/test_reporting_regressions.py::test_frontend_status_summary_does_not_expose_ad_hoc_public_asin_panel

      - name: Ensure generated demo artifacts are ignored
        shell: bash
        run: |
          changed="$(git status --short --untracked-files=no)"
          if [ -n "$changed" ]; then
            echo "$changed"
            exit 1
          fi
